<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<title>Caça Palavras</title>

<style>

.tabuleiro{
  display: grid;
  grid-template-columns: repeat(15, 30px);
  gap: 2px;
}

.letra{
  width: 30px;
  height: 30px;
  border: 1px solid black;
  text-align: center;
  line-height: 30px;
  cursor: pointer;
  user-select: none;
}

.container{
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 50px;
}

.imagem{
  width: 500px;
  height: 500px;

  background-image: url(Margot.jpeg);

  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
}

</style>
</head>

<body>

<h2>Caça Palavras - Arquitetura Computacional - Margot</h2>

<div class="container">

  <div class="tabuleiro"></div>

  <div class="imagem"></div>

</div>

<script>

let palavras = [
  "CPU",
  "ULA",
  "RAM",
  "ROM",
  "FLASH",
  "DMA",
  "REGISTRADORES",
  "MEMORIA",
  "DATABUS",
  "QUADCORE"
];

let tamanho = 15;

let matriz = [];

//matriz sem nada

for(let i = 0; i < tamanho; i++){

  matriz[i] = [];

  for(let j = 0; j < tamanho; j++){

    matriz[i][j] = "";
  }
}



for(let p = 0; p < palavras.length; p++){

  let palavra = palavras[p];

  // 0 = horizontal
  // 1 = vertical
  let direcao =
  Math.floor(Math.random() * 2);

  let linha =
  Math.floor(Math.random() * tamanho);

  let coluna =
  Math.floor(Math.random() * tamanho);

 
  // para ter palavras na horixotal
  

  if(direcao == 0){

    coluna =
    Math.floor(
      Math.random() *
      (tamanho - palavra.length)
    );

    for(let i = 0; i < palavra.length; i++){

      matriz[linha][coluna + i] =
      palavra[i];
    }
  }


  // para ter palavars na vertical
  

  else{

    linha =
    Math.floor(
      Math.random() *
      (tamanho - palavra.length)
    );

    for(let i = 0; i < palavra.length; i++){

      matriz[linha + i][coluna] =
      palavra[i];
    }
  }
}




let letras = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

for(let i = 0; i < tamanho; i++){

  for(let j = 0; j < tamanho; j++){

    if(matriz[i][j] == ""){

      matriz[i][j] =
      letras[
        Math.floor(
          Math.random() * letras.length
        )
      ];
    }
  }
}


// Esse é o tabuleiro


let tabuleiro =
document.querySelector(".tabuleiro");

for(let i = 0; i < tamanho; i++){

  for(let j = 0; j < tamanho; j++){

    let div =
    document.createElement("div");

    div.classList.add("letra");

    div.textContent = matriz[i][j];

    tabuleiro.appendChild(div);
  }
}


// Mouse funcionando


let selecionando = false;

tabuleiro.addEventListener("mousedown", function(e){

  if(e.target.classList.contains("letra")){

    selecionando = true;

    e.target.style.background = "yellow";
  }
});

tabuleiro.addEventListener("mouseover", function(e){

  if(
    selecionando &&
    e.target.classList.contains("letra")
  ){

    e.target.style.background = "yellow";
  }
});

document.addEventListener("mouseup", function(){

  selecionando = false;
});

</script>

</body>
</html>
